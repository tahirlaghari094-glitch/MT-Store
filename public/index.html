<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT STORE - Multi Vendor Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f97316; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-20 font-sans antialiased">

    <!-- Header Navigation -->
    <header class="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-md border-b border-gray-900 px-4 py-3">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="switchTab('home')">
                <div class="w-8 h-8 rounded-xl bg-orange-500 text-slate-950 flex items-center justify-center font-black text-sm">
                    MT
                </div>
                <span class="font-black text-lg tracking-wider text-white">STORE</span>
            </div>
            <div id="user-avatar-btn" onclick="switchTab('account')" class="cursor-pointer">
                <div class="w-8 h-8 rounded-full bg-slate-900 border border-gray-800 flex items-center justify-center text-xs font-bold text-gray-400">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="max-w-md mx-auto p-4">

        <!-- Notification Toast -->
        <div id="notification-toast" class="hidden fixed top-16 left-1/2 -translate-x-1/2 z-50 bg-slate-900 border border-orange-500 text-white text-xs px-4 py-2.5 rounded-full shadow-2xl flex items-center gap-2">
            <i class="fa-solid fa-circle-info text-orange-500" id="toast-icon"></i>
            <span id="toast-msg">Notification message</span>
        </div>

        <!-- TAB 1: HOME / CATALOG -->
        <section id="tab-home" class="tab-content space-y-4">
            <!-- Search & Filters -->
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-xs text-gray-500"></i>
                    <input type="text" id="search-input" onkeyup="filterProducts()" placeholder="Search marketplace..." class="w-full bg-slate-900 border border-gray-800 rounded-xl pl-9 pr-4 py-2.5 text-xs text-white placeholder-gray-500 focus:border-orange-500 outline-none">
                </div>
                <select id="category-filter" onchange="filterProducts()" class="bg-slate-900 border border-gray-800 rounded-xl px-3 py-2.5 text-xs text-gray-300 outline-none">
                    <option value="all">All Items</option>
                    <option value="electronics">Electronics</option>
                    <option value="fashion">Fashion</option>
                    <option value="services">Services</option>
                </select>
            </div>

            <!-- Product Grid -->
            <div id="product-grid" class="grid grid-cols-2 gap-3">
                <!-- Products dynamically rendered here -->
            </div>
        </section>

        <!-- TAB 2: PRODUCT DETAIL PAGE -->
        <section id="tab-details" class="tab-content hidden space-y-4">
            <button onclick="switchTab('home')" class="text-xs text-gray-400 hover:text-white flex items-center gap-1.5 font-semibold">
                <i class="fa-solid fa-arrow-left"></i> Back to Catalog
            </button>
            <div id="detail-container">
                <!-- Dynamic Detail Content -->
            </div>
        </section>

        <!-- TAB 3: LIVE MESSAGES / CHAT -->
        <section id="tab-messages" class="tab-content hidden space-y-4">
            <h2 class="text-base font-bold text-white flex items-center gap-2">
                <i class="fa-solid fa-comments text-orange-500"></i> Direct Messages & Inquiries
            </h2>
            <div id="chat-box" class="bg-slate-900 border border-gray-800 rounded-2xl p-4 h-80 overflow-y-auto space-y-3 flex flex-col">
                <div class="text-center text-xs text-gray-500 my-auto">Select product contact or start message conversation below.</div>
            </div>
            <form onsubmit="sendSupportMessage(event)" class="flex gap-2">
                <input type="text" id="support-msg-input" placeholder="Type your inquiry or message..." required class="flex-1 bg-slate-900 border border-gray-800 rounded-xl px-4 py-3 text-xs text-white focus:border-orange-500 outline-none">
                <button type="submit" class="bg-orange-500 text-slate-950 font-bold px-4 py-3 rounded-xl text-xs uppercase tracking-wider">Send</button>
            </form>
        </section>

        <!-- TAB 4: ACCOUNT / SELLER VENDOR TAB -->
        <section id="tab-account" class="tab-content hidden space-y-4">
            <!-- Auth Form if not logged in -->
            <div id="auth-section" class="bg-slate-900 border border-gray-800 rounded-2xl p-5 space-y-4">
                <h3 class="text-sm font-bold text-white uppercase tracking-wider">Session Authentication</h3>
                <form onsubmit="handleAuth(event)" class="space-y-3">
                    <input type="email" id="auth-email" placeholder="Your Email Address" required class="w-full bg-slate-950 border border-gray-800 rounded-xl px-4 py-3 text-xs text-white focus:border-orange-500 outline-none">
                    <input type="text" id="auth-name" placeholder="Full Name or Username" class="w-full bg-slate-950 border border-gray-800 rounded-xl px-4 py-3 text-xs text-white focus:border-orange-500 outline-none">
                    <button type="submit" class="w-full bg-orange-500 text-slate-950 font-bold py-3 rounded-xl text-xs uppercase tracking-wider">Authenticate Session</button>
                </form>
            </div>

            <!-- Seller Dashboard (If logged in) -->
            <div id="seller-dashboard" class="hidden space-y-4">
                <div class="bg-slate-900 border border-gray-800 rounded-2xl p-4 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] uppercase font-bold text-gray-500">Active Vendor Session</p>
                        <h4 id="user-display-email" class="text-xs font-bold text-white">user@email.com</h4>
                    </div>
                    <button onclick="logout()" class="text-xs text-rose-400 hover:underline font-bold">Logout</button>
                </div>

                <!-- Add / Edit Listing Form -->
                <div class="bg-slate-900 border border-gray-800 rounded-2xl p-5 space-y-4">
                    <h3 id="form-heading" class="text-xs font-black uppercase text-orange-500 tracking-wider">Create New Listing Pipeline</h3>
                    
                    <form id="product-upload-form" onsubmit="handleProductUpload(event)" class="space-y-4">
                        <input type="hidden" id="editing-product-id" value="">
                        
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1.5">Product Title</label>
                            <input type="text" id="p-title" required class="w-full bg-slate-950 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none transition">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1.5">Price (PKR)</label>
                                <input type="number" id="p-price" required class="w-full bg-slate-950 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1.5">Category</label>
                                <select id="p-category" class="w-full bg-slate-950 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none transition text-white">
                                    <option value="electronics">Electronics</option>
                                    <option value="fashion">Fashion</option>
                                    <option value="services">Services</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1.5">Description</label>
                            <textarea id="p-description" rows="3" class="w-full bg-slate-950 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none transition"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <label class="bg-slate-950 border border-dashed border-gray-800 rounded-xl p-4 text-center cursor-pointer hover:border-orange-500/40 transition">
                                <span id="lbl-images" class="text-xs text-gray-400 block">Select Product Images</span>
                                <input type="file" id="p-image-file" multiple accept="image/*" class="hidden" onchange="previewMedia(this, 'lbl-images')">
                            </label>
                            <label class="bg-slate-950 border border-dashed border-gray-800 rounded-xl p-4 text-center cursor-pointer hover:border-orange-500/40 transition">
                                <span id="lbl-video" class="text-xs text-gray-400 block">Attach Item Video</span>
                                <input type="file" id="p-video-file" accept="video/*" class="hidden" onchange="previewMedia(this, 'lbl-video')">
                            </label>
                        </div>
                        
                        <!-- Editable Seller Email & Seller Phone Inputs -->
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1.5">Seller Email Address</label>
                                <input type="email" id="p-email" required placeholder="seller@email.com" class="w-full bg-slate-950 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none transition text-white">
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1.5">Seller Phone Number</label>
                                <input type="tel" id="p-phone" required placeholder="03XXXXXXXXX" class="w-full bg-slate-950 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:border-orange-500 outline-none transition text-white">
                            </div>
                        </div>

                        <button type="submit" id="btn-submit-listing" class="w-full bg-orange-500 text-slate-950 font-black py-4 rounded-xl text-xs uppercase tracking-wider transition shadow-lg">Submit Store Verification Pipeline</button>
                        <button type="button" id="btn-cancel-edit" onclick="cancelProductEditMode()" class="hidden w-full bg-slate-800 text-gray-300 font-bold py-2.5 rounded-xl text-xs uppercase">Cancel Edit</button>
                    </form>
                </div>
            </div>
        </section>

    </main>

    <!-- Bottom Fixed Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 z-40 bg-slate-950/90 backdrop-blur-md border-t border-gray-900 py-2">
        <div class="max-w-md mx-auto flex justify-around items-center">
            <button onclick="switchTab('home')" id="nav-home" class="nav-btn flex flex-col items-center gap-1 text-orange-500">
                <i class="fa-solid fa-store text-base"></i>
                <span class="text-[10px] font-bold">Store</span>
            </button>
            <button onclick="switchTab('messages')" id="nav-messages" class="nav-btn flex flex-col items-center gap-1 text-gray-500">
                <i class="fa-solid fa-comments text-base"></i>
                <span class="text-[10px] font-bold">Chat</span>
            </button>
            <button onclick="switchTab('account')" id="nav-account" class="nav-btn flex flex-col items-center gap-1 text-gray-500">
                <i class="fa-solid fa-user text-base"></i>
                <span class="text-[10px] font-bold">Account</span>
            </button>
        </div>
    </nav>

    <script src="main.js"></script>
</body>
</html>
