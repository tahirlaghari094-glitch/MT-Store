<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT Store - Multi-Vendor Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#f97316',
                            dark: '#070a13',
                            card: '#0f172a',
                            border: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-slate-100 min-h-screen pb-24 font-sans antialiased selection:bg-brand-orange selection:text-black">

    <!-- NAVBAR -->
    <header class="sticky top-0 z-40 bg-brand-dark/90 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
            <div class="flex items-center gap-2 cursor-pointer" onclick="switchTab('home')">
                <span class="text-2xl font-black tracking-wider text-brand-orange">MT STORE</span>
            </div>
            
            <div class="flex-1 max-w-md relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input type="text" id="searchInput" oninput="filterProducts()" placeholder="Search store items..." class="w-full bg-slate-900 border border-slate-800 rounded-full pl-9 pr-4 py-2 text-xs text-white focus:outline-none focus:border-brand-orange">
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleUserModal()" id="userAuthBtn" class="text-xs bg-slate-800 hover:bg-slate-700 text-white font-bold px-3 py-2 rounded-lg border border-slate-700 flex items-center gap-2">
                    <i class="fa-solid fa-user text-brand-orange"></i>
                    <span id="userAuthText">Login</span>
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        
        <!-- HOME / PRODUCT GRID SECTION -->
        <section id="sec-home" class="space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold text-white tracking-wide">Featured Listings</h2>
                <span id="productCount" class="text-xs text-slate-400">Loading items...</span>
            </div>
            <div id="productGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                <!-- Products will render here dynamically -->
            </div>
        </section>

        <!-- SELLER DASHBOARD SECTION -->
        <section id="sec-seller" class="hidden space-y-6">
            <div class="bg-brand-card border border-slate-800 rounded-2xl p-6">
                <h2 class="text-lg font-bold text-white mb-4">Seller Listing Dashboard</h2>
                
                <form id="productForm" onsubmit="handleProductSubmit(event)" class="space-y-4">
                    <input type="hidden" id="editProductId">
                    
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1">PRODUCT TITLE</label>
                        <input type="text" id="pTitle" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white focus:border-brand-orange focus:outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1">PRICE (PKR)</label>
                            <input type="number" id="pPrice" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white focus:border-brand-orange focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1">CATEGORY</label>
                            <select id="pCategory" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white focus:border-brand-orange focus:outline-none">
                                <option value="electronics">Electronics</option>
                                <option value="fashion">Fashion</option>
                                <option value="accessories">Accessories</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1">DESCRIPTION</label>
                        <textarea id="pDesc" rows="3" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white focus:border-brand-orange focus:outline-none"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1">SELLER EMAIL</label>
                            <input type="email" id="pSellerEmail" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white focus:border-brand-orange focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1">SELLER PHONE / WHATSAPP</label>
                            <input type="text" id="pSellerPhone" placeholder="+923001234567" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white focus:border-brand-orange focus:outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1">IMAGE URL (OR BASE64)</label>
                        <input type="text" id="pImage" placeholder="https://..." required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white focus:border-brand-orange focus:outline-none">
                    </div>

                    <button type="submit" id="subBtn" class="w-full bg-brand-orange hover:bg-orange-600 text-black font-extrabold py-3 rounded-xl text-xs uppercase tracking-wider transition">
                        Submit Listing for Admin Approval
                    </button>
                </form>
            </div>
        </section>

        <!-- CART SECTION -->
        <section id="sec-cart" class="hidden space-y-6">
            <h2 class="text-lg font-bold text-white">Your Shopping Cart</h2>
            <div id="cartItems" class="space-y-3"></div>
            
            <div id="checkoutBox" class="bg-brand-card border border-slate-800 rounded-2xl p-6 hidden space-y-4">
                <h3 class="text-sm font-bold text-brand-orange">Shipping Details</h3>
                <input type="text" id="bName" placeholder="Full Name" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white">
                <input type="email" id="bEmail" placeholder="Email Address" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white">
                <input type="text" id="bPhone" placeholder="Phone Number" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white">
                <textarea id="bAddress" placeholder="Complete Delivery Address" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white"></textarea>

                <button onclick="placeOrder()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-extrabold py-3 rounded-xl text-xs uppercase">
                    Confirm & Place Order
                </button>
            </div>
        </section>

        <!-- ACCOUNT / ORDERS SECTION -->
        <section id="sec-account" class="hidden space-y-6">
            <h2 class="text-lg font-bold text-white">My Orders</h2>
            <div id="myOrdersList" class="space-y-4"></div>
        </section>

    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-brand-dark/95 border-t border-slate-800 backdrop-blur-md">
        <div class="max-w-md mx-auto grid grid-cols-4 text-center py-2">
            <button onclick="switchTab('home')" class="nav-btn text-brand-orange flex flex-col items-center gap-1 text-[10px]">
                <i class="fa-solid fa-house text-base"></i> Home
            </button>
            <button onclick="switchTab('seller')" class="nav-btn text-slate-400 flex flex-col items-center gap-1 text-[10px]">
                <i class="fa-solid fa-store text-base"></i> Seller
            </button>
            <button onclick="switchTab('cart')" class="nav-btn text-slate-400 flex flex-col items-center gap-1 text-[10px] relative">
                <i class="fa-solid fa-cart-shopping text-base"></i> Cart
                <span id="cartBadge" class="absolute top-0 right-6 bg-brand-orange text-black font-bold text-[9px] px-1.5 rounded-full hidden">0</span>
            </button>
            <button onclick="switchTab('account')" class="nav-btn text-slate-400 flex flex-col items-center gap-1 text-[10px]">
                <i class="fa-solid fa-user-gear text-base"></i> Account
            </button>
        </div>
    </nav>

    <script src="/main.js"></script>
</body>
</html>
