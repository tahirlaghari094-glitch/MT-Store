<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="5tbBo1UOGrfI216D1VNVz5Ha0PUSY8ttzTJ3XuJjzh4" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT Store - Premium Multi-Vendor Hub</title>
    <!-- FontAwesome for Pin and Nav Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0f19; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 90px; }
        .container { max-width: 600px; margin: 20px auto; padding: 15px; }
        
        /* Seller Card Style */
        .profile-card { background: #111827; border-radius: 12px; padding: 20px; border: 1px solid #1f2937; text-align: center; margin-bottom: 20px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #1f2937; }
        .badge { background: #e11d48; color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; margin-top: 5px; }
        
        /* Titles and Buttons */
        .section-title { font-size: 14px; color: #9ca3af; letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase; text-align: left; font-weight: 600; }
        .add-item-btn { width: 100%; background: #2563eb; border: none; color: white; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; display: block; font-size: 14px; transition: background 0.2s; }
        .add-item-btn:hover { background: #1d4ed8; }
        
        /* Dynamic List Items */
        .order-item { background: #1f2937; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d3748; }
        .cancel-btn { background: #e11d48; border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 13px; }
        .cancel-btn:hover { background: #be123c; }

        /* Central Command Support UI */
        .central-support { background: #111827; border-radius: 12px; padding: 15px; border: 1px solid #1f2937; margin-top: 20px; }
        .support-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .support-logo { background: #e11d48; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        
        /* Comment Box Input Area */
        .comment-box-wrapper { display: flex; align-items: center; background: #1f2937; border-radius: 8px; padding: 5px 12px; border: 1px solid #2d3748; }
        .comment-box-wrapper textarea { flex: 1; background: transparent; border: none; color: white; resize: none; outline: none; padding: 8px 0; height: 40px; font-family: inherit; font-size: 14px; }
        .pin-btn { background: transparent; border: none; color: #9ca3af; cursor: pointer; padding: 8px; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .pin-btn:hover { color: #3b82f6; }

        /* Bottom Nav Bar */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111827; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1f2937; z-index: 100; }
        .nav-item { background: transparent; border: none; color: #9ca3af; display: flex; flex-direction: column; align-items: center; font-size: 12px; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: #3b82f6; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Main Content Area: Seller View (Default state shown on Account screen) -->
        <div id="sellerViewContainer">
            <div class="profile-card">
                <div style="position: relative; display: inline-block;">
                    <img src="https://via.placeholder.com/80" alt="Muhammad Tahir" class="avatar">
                </div>
                <h2 style="font-size: 20px; margin-top: 10px;">Muhammad Tahir <i class="fas fa-pen" style="font-size: 14px; cursor: pointer; color: #9ca3af; margin-left: 5px;"></i></h2>
                <p style="color: #9ca3af; margin: 4px 0 8px 0; font-size: 14px;">lagharitahir08@gmail.com</p>
                <span class="badge">SELLER ACCOUNT</span>
            </div>

            <!-- Changed heading to: YOUR UPLOADED PRODUCTS -->
            <h3 class="section-title">YOUR UPLOADED PRODUCTS</h3>

            <!-- Added: Add New Item Button -->
            <button class="add-item-btn" id="addNewItemBtn"><i class="fas fa-plus" style="margin-right: 6px;"></i> Add New Item</button>

            <!-- Main dynamic list interface container -->
            <div id="dynamicListContainer">
                <!-- Data lists load dynamically through main.js -->
            </div>
        </div>

        <!-- Central Command Support Section (Only displays inside Message mode) -->
        <div class="central-support" id="centralSupportSection" style="display: none;">
            <div class="support-header">
                <span class="support-logo">MT</span>
                <strong>Central Command Support</strong>
            </div>
            
            <div class="comment-box-wrapper">
                <textarea id="commentInput" placeholder="Write a comment or message..."></textarea>
                
                <!-- Hidden file selector field for direct gallery access -->
                <input type="file" id="hiddenFileInput" style="display: none;" accept="image/*,video/*" multiple>
                
                <!-- Pin icon clickable trigger -->
                <button type="button" class="pin-btn" id="pinAttachmentBtn" title="Attach Files/Gallery">
                    <i class="fas fa-paperclip"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Persistent Bottom Tab Controls Bar -->
    <nav class="bottom-nav">
        <button class="nav-item" id="homeTab" onclick="switchTab('home')">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </button>
        <button class="nav-item" id="messageTab" onclick="switchTab('message')">
            <i class="fas fa-comment-alt"></i>
            <span>Message</span>
        </button>
        <button class="nav-item" id="cartTab" onclick="switchTab('cart')">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
        </button>
        <button class="nav-item active" id="accountTab" onclick="switchTab('account')">
            <i class="fas fa-user-cog"></i>
            <span>Account</span>
        </button>
    </nav>

    <script src="main.js"></script>
</body>
</html>
