<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT Store - Premium Multi-Vendor Hub</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0f19; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; padding-bottom: 70px; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* Top Navigation Header Bar */
        .top-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        .logo { color: #f97316; font-weight: bold; font-size: 20px; text-transform: uppercase; }
        .options-btn { background: transparent; border: 1px solid #1f2937; color: white; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Seller Profile Structure */
        .profile-card { background: #111827; border-radius: 12px; padding: 20px; border: 1px solid #1f2937; text-align: center; margin-bottom: 20px; position: relative; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #1f2937; }
        .badge { background: #f97316; color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; margin-top: 5px; text-transform: uppercase; }
        .logout-inline-btn { background: transparent; border: none; color: #ef4444; font-size: 13px; cursor: pointer; margin-top: 8px; display: inline-block; text-decoration: underline; }
        
        /* Layout Typography and Core Buttons */
        .section-title { font-size: 13px; color: #9ca3af; letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase; text-align: left; font-weight: 600; }
        .add-item-btn { width: 100%; background: #2563eb; border: none; color: white; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; display: block; font-size: 14px; }
        .add-item-btn:hover { background: #1d4ed8; }
        
        /* Real Uploaded Products Dynamic Grid Cards */
        .order-item { background: #111827; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1f2937; }
        .cancel-btn { background: #ef4444; border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 13px; }
        .cancel-btn:hover { background: #dc2626; }

        /* Central Command Support View UI */
        .central-support { background: #111827; border-radius: 12px; padding: 15px; border: 1px solid #1f2937; margin-top: 20px; }
        .support-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .support-logo { background: #ef4444; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .comment-box-wrapper { display: flex; align-items: center; background: #1f2937; border-radius: 8px; padding: 5px 12px; border: 1px solid #2d3748; }
        .comment-box-wrapper textarea { flex: 1; background: transparent; border: none; color: white; resize: none; outline: none; padding: 8px 0; height: 40px; font-family: inherit; font-size: 14px; }
        .pin-btn { background: transparent; border: none; color: #9ca3af; cursor: pointer; padding: 8px; font-size: 18px; }

        /* Clean Fixed Bottom Nav (Khatam kiya gaya har page k niche ka extra space/black block) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111827; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #1f2937; z-index: 999; }
        .nav-item { background: transparent; border: none; color: #9ca3af; display: flex; flex-direction: column; align-items: center; font-size: 11px; cursor: pointer; text-decoration: none; width: 25%; }
        .nav-item.active { color: #f97316; }
        .nav-item i { font-size: 18px; margin-bottom: 3px; }

        /* Auth Screen Helper */
        #authContainer { display: none; text-align: center; padding: 50px 20px; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; background: #1f2937; border: 1px solid #2d3748; color: white; border-radius: 6px; }
        .auth-btn { width: 100%; padding: 12px; background: #f97316; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Product Upload Modal Popup */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #111827; padding: 20px; border-radius: 12px; border: 1px solid #1f2937; width: 90%; max-width: 450px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
        .save-btn { flex: 1; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .close-btn { flex: 1; padding: 10px; background: #374151; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container" id="mainAppStructure">
        <!-- Top Title Bar Header -->
        <div class="top-header">
            <div class="logo">MT Store</div>
            <button class="options-btn"><i class="fas fa-ellipsis-v"></i></button>
        </div>

        <!-- Vendor Dashboard Profile Block -->
        <div id="sellerViewContainer">
            <div class="profile-card">
                <img src="https://via.placeholder.com/80" alt="Muhammad Tahir" class="avatar">
                <h2 style="font-size: 18px; margin-top: 10px;" id="userNameTitle">Muhammad Tahir</h2>
                <p style="color: #9ca3af; margin: 2px 0; font-size: 13px;" id="userEmailTitle">lagharitahir08@gmail.com</p>
                <span class="badge" id="accountBadge">Seller Account</span><br/>
                <button class="logout-inline-btn" onclick="executeAppLogout()">Logout Account</button>
            </div>

            <!-- Header Updated: Real Uploaded Products Title -->
            <h3 class="section-title">YOUR UPLOADED PRODUCTS</h3>

            <!-- Action Trigger Button: Upload New Product -->
            <button class="add-item-btn" id="openUploadModalBtn"><i class="fas fa-plus" style="margin-right: 6px;"></i> Upload New Product</button>

            <!-- Real Live Stream Container for Database Items -->
            <div id="realProductsDynamicContainer">
                <p style="color:#9ca3af; font-size:14px; text-align:center;">Loading database products...</p>
            </div>
        </div>

        <!-- Central Support Control Panel Wrapper (Only for Message tab) -->
        <div class="central-support" id="centralSupportSection" style="display: none;">
            <div class="support-header">
                <span class="support-logo">MT</span>
                <strong>Central Command Support</strong>
            </div>
            <div class="comment-box-wrapper">
                <textarea id="commentInput" placeholder="Write a comment or message..."></textarea>
                <input type="file" id="hiddenFileInput" style="display: none;" accept="image/*,video/*" multiple>
                <button type="button" class="pin-btn" id="pinAttachmentBtn">
                    <i class="fas fa-paperclip"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- User Auth Standalone Screen Panel -->
    <div class="container" id="authContainer">
        <h2 style="color: #f97316; margin-bottom: 20px;">Login to MT Store</h2>
        <input type="email" id="loginEmail" class="auth-input" placeholder="Enter Email Address" value="lagharitahir08@gmail.com">
        <input type="password" id="loginPassword" class="auth-input" placeholder="Enter Secure Password" value="123456">
        <button class="auth-btn" id="authSubmitBtn">Login</button>
    </div>

    <!-- Dynamic Product Creation Dialog Overlay -->
    <div class="modal" id="productUploadModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; color: #f97316;">Upload New Product</h3>
            <label style="font-size:12px; color:#9ca3af;">Product Name</label>
            <input type="text" id="newProdName" class="auth-input" placeholder="e.g. GMT Watch Pro">
            <label style="font-size:12px; color:#9ca3af;">Product Price (PKR)</label>
            <input type="number" id="newProdPrice" class="auth-input" placeholder="e.g. 500">
            <div class="modal-actions">
                <button class="save-btn" id="saveProductBtn">Publish Item</button>
                <button class="close-btn" id="closeUploadModalBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Permanent Footer Tabs Controller Navigation System -->
    <nav class="bottom-nav" id="appBottomNavbar">
        <button class="nav-item" id="homeTab" onclick="switchTab('home')"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item" id="messageTab" onclick="switchTab('message')"><i class="fas fa-comment-alt"></i><span>Message</span></button>
        <button class="nav-item" id="cartTab" onclick="switchTab('cart')"><i class="fas fa-shopping-cart"></i><span>Cart</span></button>
        <button class="nav-item active" id="accountTab" onclick="switchTab('account')"><i class="fas fa-user-cog"></i><span>Account</span></button>
    </nav>

    <script src="main.js"></script>
</body>
</html>
