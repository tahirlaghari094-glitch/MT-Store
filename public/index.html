<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT Store - Premium Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-view { display: none; }
        .tab-view.active { display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen pb-20">

    <!-- Toast Notification -->
    <div id="toast-notification" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 bg-slate-900 border border-transparent text-transparent px-5 py-3 rounded-2xl transition opacity-0 -translate-y-4 pointer-events-none">
        <i class="fa-solid fa-circle-info"></i>
        <span id="toast-message" class="text-xs font-bold"></span>
    </div>

    <!-- Header / Navbar -->
    <header class="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-md border-b border-slate-900 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="switchTab('home')">
            <div class="w-8 h-8 rounded-xl bg-orange-500 text-slate-950 flex items-center justify-center font-black text-sm">
                MT
            </div>
            <span class="font-black text-sm tracking-wider uppercase text-white">MT Store</span>
        </div>

        <div class="flex items-center gap-3">
            <span id="user-status-badge" class="hidden text-[10px] font-extrabold uppercase px-2.5 py-1 rounded-lg bg-orange-500/10 text-orange-400 border border-orange-500/20"></span>
            
            <button onclick="toggleDropdown()" class="w-8 h-8 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center text-xs text-gray-300">
                <i class="fa-solid fa-user"></i>
            </button>
        </div>

        <!-- Account Mode Switcher Dropdown -->
        <div id="accountDropdown" class="hidden absolute top-14 right-4 z-50 w-48 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden p-1.5 space-y-1">
            <button onclick="setAccountType('common')" class="w-full text-left px-3 py-2 text-xs font-bold rounded-xl hover:bg-slate-800 transition text-gray-200">
                <i class="fa-solid fa-user mr-2 text-orange-400"></i> Buyer Mode
            </button>
            <button onclick="setAccountType('seller')" class="w-full text-left px-3 py-2 text-xs font-bold rounded-xl hover:bg-slate-800 transition text-gray-200">
                <i class="fa-solid fa-store mr-2 text-emerald-400"></i> Seller Dashboard
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <main class="max-w-md mx-auto p-4">

        <!-- 1. HOME VIEW -->
        <section id="home-view" class="tab-view active space-y-4">
            <div id="product-grid" class="grid grid-cols-2 gap-3">
                <!-- Products dynamically rendered -->
            </div>
        </section>

        <!-- 2. PRODUCT DETAIL VIEW -->
        <section id="detail-view" class="tab-view space-y-4">
            <button onclick="switchTab('home')" class="text-xs font-bold text-gray-400 hover:text-white flex items-center gap-2 mb-2">
                <i class="fa-solid fa-arrow-left"></i> Back to Products
            </button>
            <div id="product-detail-content" class="space-y-4"></div>
        </section>

        <!-- 3. SELLER DASHBOARD VIEW -->
        <section id="seller-view" class="tab-view space-y-4">
            <div class="flex gap-2 p-1 bg-slate-900 rounded-2xl border border-slate-800">
                <button id="btn-sub-upload" onclick="switchSellerSubTab('upload')" class="flex-1 py-2.5 rounded-xl text-xs font-black transition bg-orange-500 text-slate-950">Add Product</button>
                <button id="btn-sub-history" onclick="switchSellerSubTab('history')" class="flex-1 py-2.5 rounded-xl text-xs font-black transition bg-slate-900 text-gray-300">My Listings</button>
            </div>

            <div id="seller-upload-tab" class="active tab-view space-y-4">
                <form id="product-upload-form" onsubmit="handleProductUpload(event)" class="space-y-3">
                    <div class="bg-amber-500/10 border border-amber-500/30 p-3.5 rounded-2xl space-y-1">
                        <h5 class="text-xs font-black text-amber-400 flex items-center gap-1.5">
                            <i class="fa-solid fa-triangle-exclamation"></i> Listing Fee Policy
                        </h5>
                        <p class="text-[11px] text-gray-300">
                            Send <strong>50 PKR</strong> listing fee to EasyPaisa: <span class="text-orange-400 font-extrabold select-all">03113841402</span>. Enter Trx Receipt ID below.
                        </p>
                    </div>

                    <input type="text" id="p-title" placeholder="Product Title" required class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-white">
                    <input type="number" id="p-price" placeholder="Price (PKR)" required class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-white">
                    <input type="text" id="p-category" placeholder="Category" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-white">

                    <input type="email" id="p-seller-email" placeholder="Seller Email for Notifications" required class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-white">
                    <input type="tel" id="p-seller-phone" placeholder="Vendor Contact Phone (e.g. 0311xxxxxxx)" required class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-white">
                    <input type="text" id="p-easypaisa-trx" placeholder="EasyPaisa Receipt / Trx ID" required class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-white">

                    <textarea id="p-description" placeholder="Product Description" rows="3" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-white"></textarea>

                    <div class="grid grid-cols-2 gap-2">
                        <label class="bg-slate-900 border border-slate-800 p-3 rounded-xl text-center text-xs text-gray-300 cursor-pointer block">
                            <i class="fa-solid fa-images text-orange-400 block mb-1"></i>
                            <span id="lbl-images">Upload Images</span>
                            <input type="file" id="p-image-file" accept="image/*" multiple class="hidden" onchange="previewMedia(this, 'lbl-images')">
                        </label>
                        <label class="bg-slate-900 border border-slate-800 p-3 rounded-xl text-center text-xs text-gray-300 cursor-pointer block">
                            <i class="fa-solid fa-video text-orange-400 block mb-1"></i>
                            <span id="lbl-video">Attach Video</span>
                            <input type="file" id="p-video-file" accept="video/*" class="hidden" onchange="previewMedia(this, 'lbl-video')">
                        </label>
                    </div>

                    <button type="submit" class="w-full bg-orange-500 text-slate-950 font-black py-3 rounded-xl text-xs uppercase tracking-wider">
                        Submit Listing for Approval
                    </button>
                </form>
            </div>

            <div id="seller-history-tab" class="tab-view space-y-3">
                <!-- Seller's uploaded items render here -->
            </div>
        </section>

        <!-- 4. CART & CHECKOUT VIEW -->
        <section id="cart-view" class="tab-view space-y-4">
            <h2 class="text-sm font-black text-white uppercase tracking-wider">Shopping Basket</h2>
            <div id="cart-items-list" class="space-y-2"></div>

            <div id="cart-summary-card" class="hidden bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                <div>
                    <p id="cart-selected-count" class="text-[10px] text-gray-400 uppercase font-black">0 Items</p>
                    <p id="cart-total-price" class="text-sm font-black text-orange-400">PKR 0</p>
                </div>
            </div>

            <div id="checkout-form-container" class="hidden space-y-3 pt-2">
                <h3 class="text-xs font-extrabold text-white">Delivery Credentials</h3>
                <input type="text" id="b-name" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-white">
                <input type="email" id="b-email" placeholder="Email Address" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-white">
                <input type="tel" id="b-phone" placeholder="Phone Number" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-white">
                <textarea id="b-address" placeholder="Shipping Address" rows="2" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-white"></textarea>
                
                <button onclick="processOrderCheckout()" class="w-full bg-emerald-500 text-slate-950 font-black py-3 rounded-xl text-xs uppercase tracking-wider shadow-lg">
                    Confirm Order
                </button>
            </div>
        </section>

        <!-- 5. ACCOUNT / PROFILE VIEW -->
        <section id="account-view" class="tab-view space-y-4">
            <!-- Login Form if guest -->
            <div id="auth-box" class="bg-slate-900 p-5 rounded-3xl border border-slate-800 space-y-3">
                <h3 class="text-xs font-black text-white uppercase">User Authentication</h3>
                <input type="email" id="auth-email" placeholder="Enter your email" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-white">
                <button onclick="handleAuth()" class="w-full bg-orange-500 text-slate-950 font-black py-3 rounded-xl text-xs uppercase">Continue</button>
            </div>

            <!-- Profile Panel -->
            <div id="profile-panel" class="hidden space-y-4">
                <div class="bg-slate-900 p-4 rounded-3xl border border-slate-800 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="relative cursor-pointer" onclick="triggerGalleryPicker()">
                            <img id="panel-user-photo" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100" class="w-12 h-12 rounded-2xl object-cover border border-orange-500/50">
                            <span class="absolute -bottom-1 -right-1 bg-orange-500 text-slate-950 w-5 h-5 rounded-full flex items-center justify-center text-[9px] font-black"><i class="fa-solid fa-camera"></i></span>
                        </div>
                        <input type="file" id="user-photo-picker" accept="image/*" class="hidden" onchange="handleProfilePhotoSelected(this)">
                        
                        <div>
                            <div class="flex items-center gap-1.5">
                                <h4 id="panel-username" class="font-extrabold text-xs text-white">User</h4>
                                <button onclick="updateUserName()" class="text-orange-400 text-[10px]"><i class="fa-solid fa-pen"></i></button>
                            </div>
                            <p id="panel-email" class="text-[10px] text-gray-400"></p>
                            <span id="panel-role" class="text-[8px] font-bold uppercase text-emerald-400"></span>
                        </div>
                    </div>

                    <button onclick="logout()" class="text-rose-400 hover:text-rose-300 text-xs font-bold p-2">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>

                <div class="space-y-2">
                    <h4 class="text-xs font-black text-white uppercase">History / Activity</h4>
                    <div id="orders-summary-container"></div>
                </div>
            </div>
        </section>

        <!-- 6. LIVE MESSAGES / HELP SUPPORT VIEW -->
        <section id="messages-view" class="tab-view space-y-4">
            <h3 class="text-xs font-black text-white uppercase tracking-wider">Help & Support Chat</h3>
            
            <div class="flex gap-2">
                <input type="text" id="user-support-input" placeholder="Type your question or issue..." class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3 py-2.5 text-xs text-white">
                <button onclick="sendUserSupportMessage()" class="bg-orange-500 text-slate-950 font-black px-4 py-2.5 rounded-xl text-xs">Send</button>
            </div>

            <div id="messages-thread-container" class="space-y-2 pt-2"></div>
        </section>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-slate-950/90 backdrop-blur-md border-t border-slate-900 max-w-md mx-auto px-4 py-2 flex justify-around items-center z-40">
        <button onclick="switchTab('home')" class="flex flex-col items-center text-gray-400 hover:text-orange-400 text-[10px] font-bold">
            <i class="fa-solid fa-house text-sm mb-1"></i> Shop
        </button>
        <button onclick="switchTab('seller')" class="flex flex-col items-center text-gray-400 hover:text-orange-400 text-[10px] font-bold">
            <i class="fa-solid fa-plus-circle text-sm mb-1"></i> Sell
        </button>
        <button onclick="switchTab('messages')" class="flex flex-col items-center text-gray-400 hover:text-orange-400 text-[10px] font-bold">
            <i class="fa-solid fa-comments text-sm mb-1"></i> Help
        </button>
        <button onclick="switchTab('cart')" class="flex flex-col items-center text-gray-400 hover:text-orange-400 text-[10px] font-bold">
            <i class="fa-solid fa-basket-shopping text-sm mb-1"></i> Cart
        </button>
        <button onclick="switchTab('account')" class="flex flex-col items-center text-gray-400 hover:text-orange-400 text-[10px] font-bold">
            <i class="fa-solid fa-user-gear text-sm mb-1"></i> Profile
        </button>
    </nav>

    <script src="main.js"></script>
</body>
</html>
